services:
  postgres:
    image: postgres:16-alpine
    container_name: bdsm_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bdsm_bot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  bot:
    build: .
    container_name: bdsm_bot
    env_file: .env
    depends_on:
      postgres:
        condition: service_started
    restart: always

volumes:
  pgdata: